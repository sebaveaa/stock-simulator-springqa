# Configuración de Base de Datos para Pruebas (H2 In-Memory)
# Reemplaza Testcontainers/PostgreSQL cuando Docker no está disponible
spring.datasource.url=jdbc:h2:mem:stocksimulator_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configuración de Email para Pruebas (Deshabilitado)
# No enviar emails reales durante las pruebas
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Configuración del Servidor
server.port=0

# Logging para Pruebas
logging.level.ucab.edu.ve.stocksimulator=DEBUG
logging.level.org.springframework.test=INFO
logging.level.org.testcontainers=INFO

# Configuración CORS para Pruebas
cors.allowed.origins=http://localhost:4200,http://localhost:8080

# Spring Test
spring.test.context.cache.maxSize=1
