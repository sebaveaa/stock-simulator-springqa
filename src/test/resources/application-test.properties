# Configuración de Base de Datos para Pruebas
# Testcontainers sobreescribirá estas configuraciones con PostgreSQL real
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configuración de Email para Pruebas (Deshabilitado)
# No enviar emails reales durante las pruebas
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Configuración del Servidor
server.port=0

# Logging para Pruebas
logging.level.ucab.edu.ve.stocksimulator=DEBUG
logging.level.org.springframework.test=INFO
logging.level.org.testcontainers=INFO

# Configuración CORS para Pruebas
cors.allowed.origins=http://localhost:4200,http://localhost:8080

# Spring Test
spring.test.context.cache.maxSize=1
